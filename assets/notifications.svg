<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="coral2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E08A63"/>
      <stop offset="1" stop-color="#C9694A"/>
    </linearGradient>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1D1D1F" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="500" fill="#F5F5F7"/>

  <!-- ROW 1: permission -->
  <g transform="translate(40,44)">
    <text x="0" y="26" fill="#C9694A" font-size="15" font-weight="800">01</text>
    <text x="0" y="52" fill="#1D1D1F" font-size="16" font-weight="700">Permission</text>
    <text x="0" y="74" fill="#86868B" font-size="14">prompt</text>
  </g>
  <g transform="translate(230,32)" filter="url(#cs)">
    <rect width="620" height="116" rx="22" fill="#FFFFFF"/>
    <rect x="24" y="32" width="52" height="52" rx="13" fill="url(#coral2)"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" transform="translate(50,58)">
      <line x1="0" y1="-13" x2="0" y2="13"/><line x1="-13" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/><line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
    <text x="92" y="52" fill="#1D1D1F" font-size="18" font-weight="700">Claude Code</text>
    <text x="596" y="50" fill="#98989D" font-size="13" text-anchor="end">now</text>
    <text x="92" y="76" fill="#86868B" font-size="14">todo-app</text>
    <text x="92" y="100" fill="#1D1D1F" font-size="16" font-weight="500">Needs your permission to run Bash</text>
  </g>

  <!-- ROW 2: question -->
  <g transform="translate(40,196)">
    <text x="0" y="26" fill="#C9694A" font-size="15" font-weight="800">02</text>
    <text x="0" y="52" fill="#1D1D1F" font-size="16" font-weight="700">Question</text>
    <text x="0" y="74" fill="#86868B" font-size="14">popup</text>
  </g>
  <g transform="translate(230,184)" filter="url(#cs)">
    <rect width="620" height="116" rx="22" fill="#FFFFFF"/>
    <rect x="24" y="32" width="52" height="52" rx="13" fill="url(#coral2)"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" transform="translate(50,58)">
      <line x1="0" y1="-13" x2="0" y2="13"/><line x1="-13" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/><line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
    <text x="92" y="52" fill="#1D1D1F" font-size="18" font-weight="700">Claude Code</text>
    <text x="596" y="50" fill="#98989D" font-size="13" text-anchor="end">now</text>
    <text x="92" y="76" fill="#86868B" font-size="14">lendtrack</text>
    <text x="92" y="100" fill="#1D1D1F" font-size="16" font-weight="500">Which database should we use?</text>
  </g>

  <!-- ROW 3: idle -->
  <g transform="translate(40,348)">
    <text x="0" y="26" fill="#C9694A" font-size="15" font-weight="800">03</text>
    <text x="0" y="52" fill="#1D1D1F" font-size="16" font-weight="700">Idle /</text>
    <text x="0" y="74" fill="#86868B" font-size="14">finished</text>
  </g>
  <g transform="translate(230,336)" filter="url(#cs)">
    <rect width="620" height="116" rx="22" fill="#FFFFFF"/>
    <rect x="24" y="32" width="52" height="52" rx="13" fill="url(#coral2)"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" transform="translate(50,58)">
      <line x1="0" y1="-13" x2="0" y2="13"/><line x1="-13" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/><line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
    <text x="92" y="52" fill="#1D1D1F" font-size="18" font-weight="700">Claude Code</text>
    <text x="596" y="50" fill="#98989D" font-size="13" text-anchor="end">now</text>
    <text x="92" y="76" fill="#86868B" font-size="14">reclaim</text>
    <text x="92" y="100" fill="#1D1D1F" font-size="16" font-weight="500">Waiting for your next prompt</text>
  </g>
</svg>
