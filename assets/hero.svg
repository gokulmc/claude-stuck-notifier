<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFBFD"/>
      <stop offset="1" stop-color="#EFEFF3"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E08A63"/>
      <stop offset="1" stop-color="#C9694A"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1D1D1F" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="360" rx="0" fill="url(#bg)"/>
  <!-- faint decorative sparks -->
  <g fill="#D98B67" opacity="0.10">
    <circle cx="1120" cy="60" r="120"/>
    <circle cx="80" cy="330" r="90"/>
  </g>

  <!-- LEFT: copy -->
  <g>
    <text x="64" y="96" fill="#B45E3F" font-size="15" font-weight="700" letter-spacing="2.5">CLAUDE CODE · macOS</text>
    <text x="62" y="158" fill="#1D1D1F" font-size="52" font-weight="800" letter-spacing="-1">claude-stuck-notifier</text>
    <text x="64" y="204" fill="#48484C" font-size="23" font-weight="400">Get pinged the moment any Claude Code window</text>
    <text x="64" y="236" fill="#48484C" font-size="23" font-weight="400">is waiting on you.</text>

    <!-- pills -->
    <g font-size="15" font-weight="600">
      <g>
        <rect x="64" y="270" width="180" height="38" rx="19" fill="#FFFFFF" stroke="#E0C4B7"/>
        <text x="154" y="294" fill="#B45E3F" text-anchor="middle">permission prompts</text>
      </g>
      <g>
        <rect x="256" y="270" width="150" height="38" rx="19" fill="#FFFFFF" stroke="#E0C4B7"/>
        <text x="331" y="294" fill="#B45E3F" text-anchor="middle">question popups</text>
      </g>
      <g>
        <rect x="418" y="270" width="130" height="38" rx="19" fill="#FFFFFF" stroke="#E0C4B7"/>
        <text x="483" y="294" fill="#B45E3F" text-anchor="middle">idle / finished</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: notification card mockup -->
  <g transform="translate(700,104)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="436" height="120" rx="22" fill="#FFFFFF"/>
    <!-- app icon -->
    <rect x="22" y="26" width="52" height="52" rx="13" fill="url(#coral)"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" transform="translate(48,52)">
      <line x1="0" y1="-13" x2="0" y2="13"/>
      <line x1="-13" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/>
      <line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
    <!-- text -->
    <text x="90" y="46" fill="#1D1D1F" font-size="18" font-weight="700">Claude Code</text>
    <text x="414" y="44" fill="#98989D" font-size="13" text-anchor="end">now</text>
    <text x="90" y="68" fill="#86868B" font-size="14">lendtrack</text>
    <text x="90" y="94" fill="#1D1D1F" font-size="16" font-weight="500">Which database should we use?</text>
  </g>
</svg>
